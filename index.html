<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.header { background:#1f2937; color:white; padding:15px; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin:5px; background:#2563eb; color:white; border:none; border-radius:6px; }
input, select { padding:8px; margin:5px; border-radius:6px; border:1px solid #ccc; width:95%; }
.dash { display:flex; gap:10px; }
.box { flex:1; padding:10px; border-radius:8px; color:white; text-align:center; }
.red{background:#dc2626;} .orange{background:#f59e0b;} .green{background:#16a34a;}
</style>
</head>

<body>

<div class="header">
<h2>DMD Equipment Tracker</h2>
</div>

<div class="container">

<div id="login" class="card">
<h3>Login</h3>
<input id="username" placeholder="Your Name">
<input id="pw" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none;">

<div class="card">
<h3>Dashboard</h3>
<div class="dash">
<div id="overdue" class="box red"></div>
<div id="soon" class="box orange"></div>
<div id="ok" class="box green"></div>
</div>
</div>

<div class="card">
<h3>Alerts</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
</div>

<div class="card">
<h3 id="eqTitle"></h3>
<p id="eqInfo"></p>

<label>Serial Number</label>
<input id="serial">

<label>Machine Notes</label>
<input id="notes">

<button onclick="saveDetails()">Save Details</button>
</div>

<div class="card">
<h3>Maintenance</h3>
<input id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<div class="card">
<h3>Log</h3>
<ul id="log"></ul>
</div>

<div class="card">
<button onclick="seed()">Load Equipment</button>
<button onclick="emailTest()">Test Email</button>
</div>

</div>

</div>

<script>
let user="", data={}, current="";

function login(){
let u = document.getElementById("username").value;
let p = document.getElementById("pw").value;

if(!u){
  alert("Enter your name");
  return;
}

if(p === "DMD2026"){
  user = u;

  document.getElementById("login").style.display = "none";
  document.getElementById("main").style.display = "block";

  // SAFE LOAD
  try {
    load();
  } catch(e){
    console.error(e);
    alert("Loading issue, but continuing...");
  }

} else {
  alert("Wrong password");
}
}

function load(){
db.collection("machines").get()
.then(snap=>{
  data={};
  snap.forEach(d=>data[d.id]=d.data());

  populate();

  let url=new URLSearchParams(window.location.search);
  let id=url.get("id");

  if(id && data[id]) selectEq(id);
  else if(Object.keys(data).length > 0)
    selectEq(Object.keys(data)[0]);

  dashboard();
  alertsBuild();
})
.catch(err=>{
  console.error("Firestore error:", err);
  alert("Database connection issue. Check Firebase rules.");
});
}

function populate(){
equipList.innerHTML="";
Object.keys(data).forEach(id=>{
equipList.innerHTML+=`<option value="${id}">${data[id].name} ${data[id].unit}</option>`;
});
}

function selectEq(id){
current=id;
let e=data[id];

eqTitle.innerText=e.name+" "+e.unit;
eqInfo.innerText=id+" | "+(e.location||"");

serial.value=e.serial||"";
notes.value=e.notes||"";

log.innerHTML="";
(e.maintenance||[]).forEach(x=>log.innerHTML+=`<li>${x}</li>`);
}

function saveDetails(){
data[current].serial=serial.value;
data[current].notes=notes.value;

db.collection("machines").doc(current).set(data[current]).then(()=>{
alert("Saved!");
});
}

function addTask(){
let t=task.value;
if(!t) return;

let e=data[current];
e.maintenance=e.maintenance||[];

e.maintenance.push(`${t} | ${new Date().toLocaleString()} | ${user}`);

let next=new Date();
next.setDate(next.getDate()+30);
e.nextServiceDue=next.toISOString();

db.collection("machines").doc(current).set(e).then(()=>{
selectEq(current);
dashboard(); alertsBuild();
});
}

function status(e){
if(!e.nextServiceDue) return "OK";
let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);
if(d<0) return "OVERDUE";
if(d<5) return "SOON";
return "OK";
}

function dashboard(){
let o=0,s=0,k=0;
Object.values(data).forEach(e=>{
let st=status(e);
if(st==="OVERDUE") o++;
else if(st==="SOON") s++;
else k++;
});
overdue.innerText="Overdue: "+o;
soon.innerText="Due Soon: "+s;
ok.innerText="OK: "+k;
}

function alertsBuild(){
alerts.innerHTML="";
Object.keys(data).forEach(id=>{
let e=data[id], st=status(e);
if(st!=="OK"){
alerts.innerHTML+=`<li>${id} - ${e.name} ${e.unit} → ${st}</li>`;
}
});
}

function emailTest(){
let list=[];
Object.keys(data).forEach(id=>{
if(status(data[id])==="OVERDUE"){
list.push(id+" - "+data[id].name);
}
});
alert(list.length?list.join("\n"):"No overdue machines");
}

function seed(){
const m={
"EQ-001":{name:"SCREEN Truepress",unit:"1"},
"EQ-002":{name:"SCREEN Truepress",unit:"2"},
"EQ-003":{name:"Oce VarioStream",unit:"1"},
"EQ-004":{name:"Oce VarioStream",unit:"2"}
};
Object.keys(m).forEach(id=>{
db.collection("machines").doc(id).set(m[id]);
});
alert("Loaded");
}
</script>

</body>
</html>
