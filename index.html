<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<!-- QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin-top:5px; background:#2563eb; color:white; border:none; border-radius:6px; }
input, select { padding:8px; margin-top:5px; width:100%; }
#reader { margin-top:10px; }
</style>
</head>

<body>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="username" placeholder="Your Name">
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

<!-- WELCOME -->
<div class="card">
<h3 id="welcome"></h3>
</div>

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<div id="dash"></div>
</div>

<!-- ALERTS -->
<div class="card">
<h3>Alerts</h3>
<ul id="alerts"></ul>
</div>

<!-- EQUIPMENT -->
<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
<button onclick="seed()">Load Equipment</button>
<button onclick="startScanner()">Scan QR</button>
<div id="reader"></div>
</div>

<!-- DETAILS -->
<div class="card">
<h3 id="eqTitle"></h3>
<input id="note" placeholder="Add note">
<input type="date" id="dueDate">
<button onclick="addNote()">Save</button>
</div>

<!-- LOG -->
<div class="card">
<h3>Log</h3>
<ul id="log"></ul>
</div>

</div>
</div>

<script>
let user="";
let data={};
let current="";

// LOGIN
function login(){
let name = document.getElementById("username").value;

if(name===""){
alert("Enter your name");
return;
}

user = name;

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("welcome").innerText = "Welcome " + user;

load();
}

// LOAD
function load(){
db.collection("machines").get().then(snap=>{
data={};
snap.forEach(d=>data[d.id]=d.data());

populate();

let first = Object.keys(data)[0];
if(first) selectEq(first);

dashboard();
alertsBuild();
});
}

// DROPDOWN
function populate(){
let list = document.getElementById("equipList");
list.innerHTML="";

Object.keys(data).forEach(id=>{
list.innerHTML += `<option value="${id}">${id} - ${data[id].name||""}</option>`;
});
}

// SELECT
function selectEq(id){
current = id;

document.getElementById("eqTitle").innerText = data[id].name;

let logBox = document.getElementById("log");
logBox.innerHTML="";

(data[id].log||[]).forEach(x=>{
logBox.innerHTML += `<li>${x}</li>`;
});
}

// SAVE
function addNote(){
let note = document.getElementById("note").value;
let due = document.getElementById("dueDate").value;

if(note==="") return;

let e = data[current];
e.log = e.log || [];

e.log.push(note + " - " + user);

if(due){
e.nextServiceDue = new Date(due).toISOString();
}

db.collection("machines").doc(current).set(e).then(()=>{
selectEq(current);
document.getElementById("note").value="";
load();
});
}

// DASHBOARD
function dashboard(){
let overdue=0, soon=0, ok=0;

Object.values(data).forEach(e=>{
if(!e.nextServiceDue){ ok++; return; }

let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);

if(d<0) overdue++;
else if(d<5) soon++;
else ok++;
});

document.getElementById("dash").innerHTML =
"Overdue: "+overdue+" | Soon: "+soon+" | OK: "+ok;
}

// ALERTS
function alertsBuild(){
let box = document.getElementById("alerts");
box.innerHTML="";

Object.keys(data).forEach(id=>{
let e=data[id];
if(!e.nextServiceDue) return;

let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);

if(d<0){
box.innerHTML += `<li>${id} - ${e.name} OVERDUE</li>`;
}
else if(d<5){
box.innerHTML += `<li>${id} - ${e.name} due soon</li>`;
}
});
}

// QR SCANNER
function startScanner(){
const scanner = new Html5Qrcode("reader");

scanner.start({ facingMode: "environment" }, { fps: 10 },
(decodedText) => {

let url = new URL(decodedText);
let id = url.searchParams.get("id");

if(id && data[id]){
selectEq(id);
scanner.stop();
}

});
}

// SEED
function seed(){
let machines = {
"EQ-001":{name:"Machine A"},
"EQ-002":{name:"Machine B"},
"EQ-003":{name:"Machine C"}
};

Object.keys(machines).forEach(id=>{
db.collection("machines").doc(id).set(machines[id]);
});

alert("Equipment Loaded");
load();
}
</script>

</body>
</html>
