<html>
<head>

<meta charset="UTF-8">
<title>DIRECT MAIL DEPOT Equipment Tracker</title>
<style>
body { font-family: Arial; margin:20px; }
h1,h2,h3{margin-bottom:5px;}
#main{display:none;}
input,button,select{padding:5px;margin:5px;}
  <input id="emailTo" placeholder="Enter email(s) - separate with commas">
<button onclick="sendEmailAlerts()">📧 Send Alerts</button>
#equipmentList{margin-bottom:20px;}
#newEquipModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);}
#modalContent{background:white;padding:20px;margin:50px auto;width:300px;border-radius:8px;}
</style>
</head>
<body>

<h1>DIRECT MAIL DEPOT Equipment Tracker</h1>

<div id="login">
  <h2>Enter Password</h2>
  <input type="password" id="pw" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="main">
  <h2>Equipment</h2>
  <select id="equipmentList" onchange="selectEquipment(this.value)">
    <option value="">--Select equipment--</option>
  </select>
  <button onclick="showAddEquipment()">Add New Equipment</button>

  <h3 id="equipName"></h3>
  <p id="equipInfo"></p>

  <h3>Maintenance</h3>
  <select id="taskDropdown">
    <option value="">--Select task--</option>
    <option value="Clean Roll">Clean Roll</option>
    <option value="Replace Ink">Replace Ink</option>
    <option value="Inspect Print Head">Inspect Print Head</option>
    <option value="Calibrate Machine">Calibrate Machine</option>
  </select>
  <input id="taskInput" placeholder="Or type your task">
  <button onclick="addTask()">Add</button>

  <ul id="log"></ul>
</div>

<!-- Modal for adding new equipment -->
<div id="newEquipModal">
  <div id="modalContent">
    <h3>Add New Equipment</h3>
    <input id="newID" placeholder="ID (e.g. EQ-081)"><br>
    <input id="newName" placeholder="Name"><br>
    <input id="newUnit" placeholder="Unit #"><br>
    <input id="newLocation" placeholder="Location"><br>
    <input id="newSerial" placeholder="Serial #"><br>
    <button onclick="addEquipment()">Add</button>
    <button onclick="hideAddEquipment()">Cancel</button>
  </div>
</div>

<footer>
<p>© 2026 Clifford A. Kempadoo<br>DIRECT MAIL DEPOT</p>
</footer>

<!-- Firebase scripts -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>

<script>
// ---- CONFIGURE FIREBASE ----
const firebaseConfig = {
  apiKey: "YOUR_API_KEY",
  authDomain: "YOUR_PROJECT.firebaseapp.com",
  projectId: "YOUR_PROJECT",
  storageBucket: "YOUR_PROJECT.appspot.com",
  messagingSenderId: "YOUR_SENDER_ID",
  appId: "YOUR_APP_ID"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// ---- PASSWORD ----
const password="DMD2026";

// ---- LOAD MACHINE DATA ----
let data = {}; // will be populated from Firestore

function populateDropdown(){
  const sel = document.getElementById("equipmentList");
  sel.innerHTML = '<option value="">--Select equipment--</option>';
  Object.keys(data).forEach(id=>{
    sel.innerHTML += `<option value="${id}">${data[id].name} ${data[id].unit} (${id})</option>`;
  });
}

function selectEquipment(id){
  if(!id) return;
  updateEquipment(id);
  const url = new URL(window.location);
  url.searchParams.set('eq', id);
  window.history.replaceState({}, '', url);
}

// ---- LOGIN ----
function login(){
  if(document.getElementById("pw").value === password){
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    loadAllMachines();
  } else alert("Wrong password");
}

// ---- LOAD ALL MACHINES FROM FIRESTORE ----
function loadAllMachines(){
  db.collection("machines").get().then(snapshot=>{
    snapshot.forEach(doc=>{
      data[doc.id] = doc.data();
    });
    populateDropdown();
    const id = new URLSearchParams(window.location.search).get('eq') || Object.keys(data)[0];
    updateEquipment(id);
  });
}

// ---- UPDATE UI FOR SELECTED MACHINE ----
function updateEquipment(id){
  if(!data[id]){
    // If machine doesn't exist, create placeholder
    data[id] = {name:"New Machine", unit:"", location:"", serial:"", maintenance:[]};
    db.collection("machines").doc(id).set(data[id]);
  }
  const eq = data[id];
  document.getElementById("equipName").innerText = eq.name + " " + eq.unit;
  document.getElementById("equipInfo").innerText = id + " | " + eq.location + " | Serial: " + eq.serial;
  const log = document.getElementById("log");
  log.innerHTML="";
  (eq.maintenance || []).forEach(x=>{
    const li=document.createElement("li");
    li.innerText=x;
    log.appendChild(li);
  });
}

// ---- ADD MAINTENANCE ----
function addTask(){
  const id = new URLSearchParams(window.location.search).get("eq") || Object.keys(data)[0];
  const eq = data[id];
  let task = document.getElementById("taskDropdown").value;
  const freeText = document.getElementById("taskInput").value;
  if(freeText) task = freeText;
  if(!task) return alert("Select or type a task");
  eq.maintenance = eq.maintenance || [];
  eq.maintenance.push(new Date().toLocaleString()+" - "+task);
  // save to Firestore
  db.collection("machines").doc(id).set(eq).then(()=>{
    document.getElementById("taskDropdown").selectedIndex=0;
    document.getElementById("taskInput").value="";
    updateEquipment(id);
  });
}

// ---- ADD NEW EQUIPMENT ----
function showAddEquipment(){ document.getElementById("newEquipModal").style.display="block"; }
function hideAddEquipment(){ document.getElementById("newEquipModal").style.display="none"; }

function addEquipment(){
  const id = document.getElementById("newID").value;
  const name = document.getElementById("newName").value;
  const unit = document.getElementById("newUnit").value;
  const location = document.getElementById("newLocation").value;
  const serial = document.getElementById("newSerial").value;
  if(!id || !name) return alert("ID and Name required");
  const newEq = {name, unit, location, serial, maintenance:[]};
  data[id]=newEq;
  db.collection("machines").doc(id).set(newEq).then(()=>{
    hideAddEquipment();
    populateDropdown();
    selectEquipment(id);
    document.getElementById("newID").value="";
    document.getElementById("newName").value="";
    document.getElementById("newUnit").value="";
    document.getElementById("newLocation").value="";
    document.getElementById("newSerial").value="";
  });
}
<script>

...your existing code...

  alert("Button is working!");
}

</script>

</script>
</body>
