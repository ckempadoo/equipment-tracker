<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.header { background:#1f2937; color:white; padding:15px; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin-top:5px; background:#2563eb; color:white; border:none; border-radius:6px; }
input, select { padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; width:100%; }
.dash { display:flex; gap:10px; }
.box { flex:1; padding:10px; border-radius:8px; color:white; text-align:center; }
.red{background:#dc2626;} .orange{background:#f59e0b;} .green{background:#16a34a;}
</style>
</head>

<body>

<div class="header">
<h2>DMD Equipment Tracker</h2>
</div>

<div class="container">

<div id="login" class="card">
<h3>Login</h3>
<input id="username" placeholder="Your Name">
<input id="pw" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none;">

<div class="card">
<h3>Dashboard</h3>
<div class="dash">
<div id="overdue" class="box red"></div>
<div id="soon" class="box orange"></div>
<div id="ok" class="box green"></div>
</div>
</div>

<div class="card">
<h3>Alerts</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
</div>

<div class="card">
<h3 id="eqTitle"></h3>
<p id="eqInfo"></p>

<label>Serial Number</label>
<input id="serial">

<label>Machine Notes</label>
<input id="notes">

<label>Next Service Due Date</label>
<input type="date" id="dueDate">

<button onclick="saveDetails()">Save Details</button>
</div>
<button onclick="archiveEquipment()" style="background:#f59e0b;">Archive Equipment</button>
<button onclick="deleteEquipment()" style="background:#dc2626;">Delete Equipment</button>
  
<div class="card">
<h3>Maintenance</h3>
<input id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<div class="card">
<h3>Maintenance Log</h3>
<ul id="log"></ul>
</div>

<div class="card">
<button onclick="seed()">Load Equipment</button>
<button onclick="emailTest()">Test Email Alerts</button>
<button onclick="reportOne()">Report: This Machine</button>
<button onclick="reportAll()">Report: ALL Machines</button>
<button onclick="emailReport()">Email Report</button>
</div>

</div>

</div>

<script>
let user="", data={}, current="";

function login(){
let u=document.getElementById("username").value;
let p=document.getElementById("pw").value;

if(!u){ alert("Enter name"); return; }

if(p==="DMD2026"){
user=u;
document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";
load();
} else alert("Wrong password");
}

function archiveEquipment(){

if(!current){
alert("No equipment selected");
return;
}

let confirmArchive = confirm("Archive this equipment?\n\n" + current);

if(!confirmArchive) return;

let e = data[current];
e.archived = true;

db.collection("machines").doc(current).set(e).then(()=>{
alert("Archived: " + current);

// remove from visible list
delete data[current];

populate();

let keys = Object.keys(data);
if(keys.length > 0){
selectEq(keys[0]);
}

dashboard();
alertsBuild();

});
}  
function load(){
db.collection("machines").get().then(snap=>{
data={};
snap.forEach(d=>data[d.id]=d.data());

populate();

let params=new URLSearchParams(window.location.search);
let id=params.get("id");

if(id && data[id]) selectEq(id);
else if(Object.keys(data).length>0) selectEq(Object.keys(data)[0]);

dashboard();
alertsBuild();
});
}

function populate(){
equipList.innerHTML="";
Object.keys(data).forEach(id=>{
equipList.innerHTML+=`<option value="${id}">${data[id].name||id} ${data[id].unit||""}</option>`;
});
}

function selectEq(id){
current=id;
let e=data[id];

eqTitle.innerText=(e.name||"")+" "+(e.unit||"");
eqInfo.innerText=id+" | "+(e.location||"");

serial.value=e.serial||"";
notes.value=e.notes||"";
dueDate.value = e.nextServiceDue ? e.nextServiceDue.split("T")[0] : "";

log.innerHTML="";
(e.maintenance||[]).forEach(x=>log.innerHTML+=`<li>${x}</li>`);
}

function saveDetails(){
data[current].serial=serial.value;
data[current].notes=notes.value;

if(dueDate.value){
data[current].nextServiceDue=new Date(dueDate.value).toISOString();
}

db.collection("machines").doc(current).set(data[current])
.then(()=>alert("Saved"));
}

function addTask(){
let t=task.value;
if(!t) return;

let e=data[current];
e.maintenance=e.maintenance||[];

e.maintenance.push(`${t} | ${new Date().toLocaleString()} | ${user}`);

if(!e.nextServiceDue){
let next=new Date();
next.setDate(next.getDate()+30);
e.nextServiceDue=next.toISOString();
}

db.collection("machines").doc(current).set(e).then(()=>{
selectEq(current);
dashboard();
alertsBuild();
});
}

function status(e){
if(!e.nextServiceDue) return "OK";
let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);
if(d<0) return "OVERDUE";
if(d<5) return "SOON";
return "OK";
}

function dashboard(){
let o=0,s=0,k=0;
Object.values(data).forEach(e=>{
let st=status(e);
if(st==="OVERDUE") o++;
else if(st==="SOON") s++;
else k++;
});
overdue.innerText="Overdue: "+o;
soon.innerText="Due Soon: "+s;
ok.innerText="OK: "+k;
}

function alertsBuild(){
alerts.innerHTML="";
Object.keys(data).forEach(id=>{
let e=data[id], st=status(e);
if(st!=="OK"){
alerts.innerHTML+=`<li>${id} - ${e.name||""} ${e.unit||""} → ${st}</li>`;
}
});
}

function emailTest(){
let list=[];
Object.keys(data).forEach(id=>{
if(status(data[id])==="OVERDUE"){
list.push(id+" - "+data[id].name);
}
});
alert(list.length?list.join("\n"):"No overdue machines");
}

function reportOne(){
let e=data[current];
let report = `EQUIPMENT REPORT\n\nID: ${current}\nName: ${e.name||""}\nSerial: ${e.serial||""}\nNext Service: ${e.nextServiceDue||""}\n\nLOG:\n${(e.maintenance||[]).join("\n")}`;
alert(report);
}

function reportAll(){
let report="ALL EQUIPMENT REPORT\n\n";
Object.keys(data).forEach(id=>{
let e=data[id];
report+=`${id} - ${e.name||""} ${e.unit||""}\nSerial: ${e.serial||""}\nNext: ${e.nextServiceDue||""}\nStatus: ${status(e)}\n\n`;
});
navigator.clipboard.writeText(report);
alert("Report copied to clipboard!");
}

function emailReport(){
let body="Overdue Machines:\n\n";
Object.keys(data).forEach(id=>{
if(status(data[id])==="OVERDUE"){
body+=id+" - "+data[id].name+"\n";
}
});
window.location.href=`mailto:?subject=Equipment Report&body=${encodeURIComponent(body)}`;
}

function seed(){

let machines = {};

let list = [
"SCREEN Truepress Jet520HD",
"Océ VarioStream 7450",
"Roll Cart",
"MCS Hawk",
"Videojet 4320",
"MSE Roll-fed Inserter",
"MSE Sheet-fed Inserter",
"Flowmaster RS Inserter",
"Flowmaster RS Inserter Advanced",
"BlueCrest Rival",
"Bowe Fusion Inserter",
"Bell and Howell Inserter",
"Universal Friction Feeder",
"Pitney Bowes R750 Meter",
"Baum Folder 8-Page",
"Baum Folder 16-Page",
"Baum Folder F&R",
"Baum Slit/Score/Perf",
"Baum Gate Fold",
"Baum Continuous Feed",
"Continuous Cutter",
"Continuous Cutter Signoff",
"Spedo Pin-less Cutter",
"ESP 400 Unwind",
"MBO Folder Plus",
"MBO Accumulator",
"Speedo Merger",
"MBO High-Speed Line",
"Pick & Place System",
"AT-112 Affixer",
"Tabber/Labeler"
];

let counts = [2,4,1,1,4,2,2,3,1,1,1,2,20,1,6,3,5,2,2,1,5,1,2,8,1,2,4,1,3,1,7];

let id = 1;

list.forEach((name,i)=>{
for(let x=0;x<counts[i];x++){
let eq = "EQ-"+String(id).padStart(3,'0');
machines[eq] = {name:name};
id++;
}
});

Object.keys(machines).forEach(k=>{
db.collection("machines").doc(k).set(machines[k]);
});

alert("FULL Equipment Loaded");
}
  function deleteEquipment(){

if(!current){
alert("No equipment selected");
return;
}

let confirmDelete = confirm("Are you sure you want to DELETE this equipment?\n\n" + current);

if(!confirmDelete) return;

db.collection("machines").doc(current).delete().then(()=>{

alert("Deleted: " + current);

// remove from local data
delete data[current];

// reload dropdown
populate();

// select next available
let keys = Object.keys(data);
if(keys.length > 0){
selectEq(keys[0]);
} else {
eqTitle.innerText="";
eqInfo.innerText="";
log.innerHTML="";
}

dashboard();
alertsBuild();

});
}
</script>

</body>
</html>
