<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>

<!-- Chart -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<!-- QR Scanner -->
<script src="https://unpkg.com/html5-qrcode"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.header { background:#1f2937; color:white; padding:15px; display:flex; align-items:center; gap:10px;}
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin-top:5px; background:#2563eb; color:white; border:none; border-radius:6px; cursor:pointer;}
input, select { padding:8px; margin-top:5px; border-radius:6px; border:1px solid #ccc; width:100%; }
.dash { display:flex; gap:10px; }
.box { flex:1; padding:10px; border-radius:8px; color:white; text-align:center; }
.red{background:#dc2626;} .orange{background:#f59e0b;} .green{background:#16a34a;}
</style>
</head>

<body>

<div class="header">
<img src="https://via.placeholder.com/100x40?text=DMD" height="40">
<h2>DMD Equipment Tracker</h2>
</div>

<div class="container">

<div id="login" class="card">
<h3>Login</h3>
<input id="username" placeholder="Email">
<input id="pw" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="main" style="display:none;">

<div class="card">
<h3>Dashboard</h3>
<div class="dash">
<div id="overdue" class="box red"></div>
<div id="soon" class="box orange"></div>
<div id="ok" class="box green"></div>
</div>
<canvas id="chart"></canvas>
</div>

<div class="card">
<h3>Alerts</h3>
<ul id="alerts"></ul>
</div>

<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
<button onclick="startScanner()">Scan QR</button>
<div id="reader"></div>
</div>

<div class="card">
<h3 id="eqTitle"></h3>
<p id="eqInfo"></p>

<input id="serial" placeholder="Serial Number">
<input id="notes" placeholder="Notes">
<input type="date" id="dueDate">

<button onclick="saveDetails()">Save</button>
<button onclick="archiveEquipment()" style="background:#f59e0b;">Archive</button>
</div>

<div class="card">
<h3>Maintenance</h3>
<input id="task" placeholder="Enter task">
<button onclick="addTask()">Add</button>
</div>

<div class="card">
<h3>Log</h3>
<ul id="log"></ul>
</div>

<div class="card">
<button onclick="exportExcel()">Export Excel</button>
</div>

</div>
</div>

<script>
let user="", data={}, current="";

function login(){

let email = username.value.trim();
let password = pw.value;

if(!email.includes("@")){
alert("Please enter a valid email address");
return;
}

firebase.auth().signInWithEmailAndPassword(email, password)
.then(res=>{
user = res.user.email;

document.getElementById("login").style.display="none";
document.getElementById("main").style.display="block";

load();
})
.catch(error=>{
alert("Login failed. Check email/password.");
});

}

function load(){
db.collection("machines").get().then(snap=>{
data={};
snap.forEach(d=>data[d.id]=d.data());
populate();

let params=new URLSearchParams(window.location.search);
let id=params.get("id");

if(id && data[id]) selectEq(id);
else selectEq(Object.keys(data)[0]);

dashboard();
alertsBuild();
drawChart();
});
}

function populate(){
equipList.innerHTML="";
Object.keys(data).forEach(id=>{
if(data[id].archived) return;
equipList.innerHTML+=`<option value="${id}">${id} - ${data[id].name||""}</option>`;
});
}

function selectEq(id){
current=id;
let e=data[id];

eqTitle.innerText=e.name||"";
eqInfo.innerText=id;

serial.value=e.serial||"";
notes.value=e.notes||"";
dueDate.value=e.nextServiceDue?e.nextServiceDue.split("T")[0]:"";

log.innerHTML="";
(e.maintenance||[]).forEach(x=>{
if(typeof x==="string"){
log.innerHTML+=`<li>${x}</li>`;
}else{
log.innerHTML+=`<li>${x.task} | ${x.date} | ${x.user}</li>`;
}
});
}

function saveDetails(){
let e=data[current];
e.serial=serial.value;
e.notes=notes.value;
if(dueDate.value) e.nextServiceDue=new Date(dueDate.value).toISOString();

db.collection("machines").doc(current).set(e).then(()=>alert("Saved"));
}

function addTask(){
let t=task.value;
if(!t) return;

let e=data[current];
e.maintenance=e.maintenance||[];

e.maintenance.push({
task:t,
date:new Date().toLocaleString(),
user:user
});

db.collection("machines").doc(current).set(e).then(()=>{
selectEq(current);
dashboard();
alertsBuild();
drawChart();
});
}

function archiveEquipment(){
let e=data[current];
e.archived=true;

db.collection("machines").doc(current).set(e).then(()=>{
delete data[current];
populate();
selectEq(Object.keys(data)[0]);
});
}

function status(e){
if(!e.nextServiceDue) return "OK";
let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);
if(d<0) return "OVERDUE";
if(d<5) return "SOON";
return "OK";
}

function dashboard(){
let o=0,s=0,k=0;
Object.values(data).forEach(e=>{
let st=status(e);
if(st==="OVERDUE") o++;
else if(st==="SOON") s++;
else k++;
});
overdue.innerText="Overdue: "+o;
soon.innerText="Soon: "+s;
ok.innerText="OK: "+k;
}

function alertsBuild(){
alerts.innerHTML="";
Object.keys(data).forEach(id=>{
let e=data[id], st=status(e);
if(st!=="OK"){
alerts.innerHTML+=`<li>${id} - ${e.name} → ${st}</li>`;
}
});
}

function drawChart(){
let o=0,s=0,k=0;
Object.values(data).forEach(e=>{
let st=status(e);
if(st==="OVERDUE") o++;
else if(st==="SOON") s++;
else k++;
});

new Chart(document.getElementById("chart"), {
type:"doughnut",
data:{
labels:["Overdue","Soon","OK"],
datasets:[{data:[o,s,k]}]
}
});
}

function exportExcel(){
let rows=[["ID","Name","Serial","Due","Status"]];
Object.keys(data).forEach(id=>{
let e=data[id];
rows.push([id,e.name||"",e.serial||"",e.nextServiceDue||"",status(e)]);
});
let csv=rows.map(r=>r.join(",")).join("\n");
let blob=new Blob([csv]);
let a=document.createElement("a");
a.href=URL.createObjectURL(blob);
a.download="report.csv";
a.click();
}

function startScanner(){
const scanner = new Html5Qrcode("reader");
scanner.start({facingMode:"environment"},{fps:10},
(decodedText)=>{
let url=new URL(decodedText);
let id=url.searchParams.get("id");
if(id && data[id]){
selectEq(id);
scanner.stop();
}
});
}
</script>

</body>
</html>
