<h3>Maintenance</h3>

<select id="taskDropdown">
  <option value="">--Select task--</option>
  <option value="Clean Roll">Clean Roll</option>
  <option value="Replace Ink">Replace Ink</option>
  <option value="Inspect Print Head">Inspect Print Head</option>
  <option value="Calibrate Machine">Calibrate Machine</option>
</select>

<input id="taskInput" placeholder="Or type your task">
<button onclick="addTask()">Add</button>

<ul id="log"></ul>

<script>
function addTask() {
  const id = new URLSearchParams(window.location.search).get("eq") || "EQ-001";
  const eq = data[id];

  let task = document.getElementById("taskDropdown").value;
  const freeText = document.getElementById("taskInput").value;

  // Use free-text if dropdown is empty
  if (freeText) task = freeText;
  if (!task) return alert("Select or type a task");

  eq.log.push(new Date().toLocaleString() + " - " + task);

  // Clear inputs
  document.getElementById("taskDropdown").selectedIndex = 0;
  document.getElementById("taskInput").value = "";

  load(); // reload the log
}
</script>
