<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }
.container { padding:20px; }
.card { background:white; padding:15px; margin-bottom:15px; border-radius:10px; }
button { padding:8px; margin-top:5px; background:#2563eb; color:white; border:none; border-radius:6px; }
input, select { padding:8px; margin-top:5px; width:100%; }
</style>
</head>

<body>

<div class="container">

<div id="loginBox" class="card">
<h3>Login</h3>
<input id="username" placeholder="Your Name">
<button onclick="login()">Enter</button>
</div>

<div id="app" style="display:none;">

<div class="card">
<h3 id="welcome"></h3>
</div>

<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
<button onclick="seed()">Load Equipment</button>
</div>

<div class="card">
<h3 id="eqTitle"></h3>
<input id="note" placeholder="Add note">
<button onclick="addNote()">Save Note</button>
</div>

<div class="card">
<h3>Log</h3>
<ul id="log"></ul>
</div>

</div>
</div>

<script>
let user="";
let data={};
let current="";

function login(){
let name = document.getElementById("username").value;

if(name===""){
alert("Enter your name");
return;
}

user = name;

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

document.getElementById("welcome").innerText = "Welcome " + user;

load();
}

function load(){
db.collection("machines").get().then(snap=>{
data={};
snap.forEach(d=>data[d.id]=d.data());

populate();

let first = Object.keys(data)[0];
if(first) selectEq(first);
});
}

function populate(){
let list = document.getElementById("equipList");
list.innerHTML="";

Object.keys(data).forEach(id=>{
list.innerHTML += `<option value="${id}">${id} - ${data[id].name||""}</option>`;
});
}

function selectEq(id){
current = id;

document.getElementById("eqTitle").innerText = data[id].name;

let logBox = document.getElementById("log");
logBox.innerHTML="";

(data[id].log||[]).forEach(x=>{
logBox.innerHTML += `<li>${x}</li>`;
});
}

function addNote(){
let note = document.getElementById("note").value;

if(note==="") return;

let e = data[current];
e.log = e.log || [];

e.log.push(note + " - " + user);

db.collection("machines").doc(current).set(e).then(()=>{
selectEq(current);
document.getElementById("note").value="";
});
}

function seed(){

alert("Loading Equipment...");

let machines = {
"EQ-001":{name:"Machine A"},
"EQ-002":{name:"Machine B"},
"EQ-003":{name:"Machine C"}
};

Object.keys(machines).forEach(id=>{
db.collection("machines").doc(id).set(machines[id]);
});

alert("Loaded!");

load();

}
</script>

</body>
</html>
