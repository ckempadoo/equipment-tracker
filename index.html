<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<!-- FIREBASE -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker",
  storageBucket: "dmd-equipment-tracker.firebasestorage.app",
  messagingSenderId: "649433121134",
  appId: "1:649433121134:web:99a0d2b15582627753417f"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

.header {
  background:#1f2937; color:white; padding:15px;
}

.container { padding:20px; }

.card {
  background:white; padding:15px; margin-bottom:15px;
  border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding:8px 12px; border:none; border-radius:6px;
  background:#2563eb; color:white; cursor:pointer;
}

input, select {
  padding:8px; margin:5px;
  border-radius:6px; border:1px solid #ccc;
}

.dash-box {
  flex:1;
  padding:15px;
  border-radius:10px;
  color:white;
  text-align:center;
}

.overdue { background:#dc2626; }
.soon { background:#f59e0b; }
.ok { background:#16a34a; }
</style>
</head>

<body>

<div class="header">
  <h2>DIRECT MAIL DEPOT Equipment Tracker</h2>
</div>

<div class="container">

<div id="login" class="card">
  <h3>Login</h3>
  <input id="username" placeholder="Your Name">
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<div id="main" style="display:none;">

<div class="card">
  <h3>Dashboard</h3>
  <div style="display:flex; gap:10px;">
    <div id="boxOverdue" class="dash-box overdue"></div>
    <div id="boxSoon" class="dash-box soon"></div>
    <div id="boxOk" class="dash-box ok"></div>
  </div>
</div>

<div class="card">
  <h3>Alerts</h3>
  <ul id="alertsList"></ul>
</div>

<div class="card">
  <h3>Equipment</h3>
  <select id="equipmentList" onchange="selectEquipment(this.value)"></select>
</div>

<div class="card">
  <h3 id="equipName"></h3>
  <p id="equipInfo"></p>
</div>

<div class="card">
  <h3>Maintenance</h3>
  <input id="taskInput" placeholder="Enter task">
  <button onclick="addTask()">Add</button>
</div>

<div class="card">
  <h3>Maintenance Log</h3>
  <ul id="log"></ul>
</div>

<div class="card">
  <h3>Setup</h3>
  <button onclick="seedMachines()">Load ALL Equipment</button>
  <button onclick="sendEmailAlerts()">Test Email Alerts</button>
</div>

</div>

<p style="text-align:center;">© 2026 Clifford A. Kempadoo</p>

</div>

<script>
const password="DMD2026";
let currentUser="";
let data={};
let currentID="";

function login(){
  const user=document.getElementById("username").value;
  const pass=document.getElementById("pw").value;

  if(!user){ alert("Enter name"); return; }

  if(pass===password){
    currentUser=user;
    document.getElementById("login").style.display="none";
    document.getElementById("main").style.display="block";
    loadMachines();
  } else alert("Wrong password");
}

function loadMachines(){
  db.collection("machines").get().then(snapshot=>{
    data={};
    snapshot.forEach(doc=>{ data[doc.id]=doc.data(); });

    populateDropdown();
    buildDashboard();
    buildAlerts();

    const first=Object.keys(data)[0];
    if(first) selectEquipment(first);
  });
}

function populateDropdown(){
  const list=document.getElementById("equipmentList");
  list.innerHTML="";
  Object.keys(data).forEach(id=>{
    list.innerHTML+=`<option value="${id}">${data[id].name} ${data[id].unit}</option>`;
  });
}

function selectEquipment(id){
  currentID=id;
  const eq=data[id];

  document.getElementById("equipName").innerText=eq.name+" "+eq.unit;
  document.getElementById("equipInfo").innerText=id+" | "+(eq.location||"");

  const log=document.getElementById("log");
  log.innerHTML="";
  eq.maintenance?.forEach(x=> log.innerHTML+=`<li>${x}</li>`);
}

function addTask(){
  const task=document.getElementById("taskInput").value;
  if(!task) return;

  data[currentID].maintenance=data[currentID].maintenance||[];

  data[currentID].maintenance.push(
    task+" | "+new Date().toLocaleString()+" | "+currentUser
  );

  let next=new Date();
  next.setDate(next.getDate()+30);
  data[currentID].nextServiceDue=next.toISOString().split("T")[0];

  db.collection("machines").doc(currentID).set(data[currentID]).then(()=>{
    selectEquipment(currentID);
    buildDashboard();
    buildAlerts();
  });
}

function getStatus(eq){
  if(!eq.nextServiceDue) return "OK";

  let diff=(new Date(eq.nextServiceDue)-new Date())/(1000*60*60*24);

  if(diff<0) return "OVERDUE";
  if(diff<5) return "DUE SOON";
  return "OK";
}

function buildDashboard(){
  let o=0,s=0,k=0;

  Object.values(data).forEach(eq=>{
    let st=getStatus(eq);
    if(st==="OVERDUE") o++;
    else if(st==="DUE SOON") s++;
    else k++;
  });

  boxOverdue.innerText="Overdue: "+o;
  boxSoon.innerText="Due Soon: "+s;
  boxOk.innerText="OK: "+k;
}

function buildAlerts(){
  alertsList.innerHTML="";
  Object.keys(data).forEach(id=>{
    let st=getStatus(data[id]);
    if(st!=="OK"){
      alertsList.innerHTML+=`<li>${id} - ${data[id].name} ${data[id].unit} → ${st}</li>`;
    }
  });
}

function sendEmailAlerts(){
  let alerts=[];

  Object.keys(data).forEach(id=>{
    if(getStatus(data[id])==="OVERDUE"){
      alerts.push(id+" - "+data[id].name);
    }
  });

  if(alerts.length===0){
    alert("No overdue machines");
    return;
  }

  alert("EMAIL REPORT:\n\n"+alerts.join("\n"));
}

function seedMachines(){

const machines = {

"EQ-001": {name:"SCREEN Truepress Jet520HD",unit:"1",location:"Digital Color",maintenance:[],serviceIntervalDays:30},
"EQ-002": {name:"SCREEN Truepress Jet520HD",unit:"2",location:"Digital Color",maintenance:[],serviceIntervalDays:30},

"EQ-003": {name:"Océ VarioStream 7450",unit:"1",location:"Laser",maintenance:[],serviceIntervalDays:30},
"EQ-004": {name:"Océ VarioStream 7450",unit:"2",location:"Laser",maintenance:[],serviceIntervalDays:30},

"EQ-005": {name:"MCS Hawk",unit:"1",location:"Inkjet",maintenance:[],serviceIntervalDays:30},

"EQ-006": {name:"Videojet 4320",unit:"1",location:"Inkjet",maintenance:[],serviceIntervalDays:30}

};

Object.keys(machines).forEach(id=>{
  db.collection("machines").doc(id).set(machines[id]);
});

alert("ALL equipment loaded!");
}
</script>

</body>
</html>
