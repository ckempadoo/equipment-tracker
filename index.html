<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyBhkaJGgEvon9hC5y5LMXRMf01iaIL0mkU",
  authDomain: "dmd-equipment-tracker.firebaseapp.com",
  projectId: "dmd-equipment-tracker"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

const users = {
  "admin@dmd.com": "1234"
};
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

.header {
  background:#1e3a8a;
  color:white;
  padding:15px;
  font-size:20px;
}

.container { padding:20px; }

.card {
  background:white;
  padding:15px;
  margin-bottom:15px;
  border-radius:10px;
}

button {
  padding:8px;
  margin-top:5px;
  background:#2563eb;
  color:white;
  border:none;
  border-radius:6px;
}

input, select {
  padding:8px;
  margin-top:5px;
  width:100%;
}

/* DASHBOARD COLORS */
.box { padding:15px; border-radius:8px; color:white; margin-bottom:5px; }
.red { background:#dc2626; }
.yellow { background:#facc15; color:black; }
.green { background:#16a34a; }
</style>
</head>

<body>

<div class="header">
DIRECT MAIL DEPOT - Equipment Tracker
</div>

<div class="container">

<!-- LOGIN -->
<div id="loginBox" class="card">
<h3>Login</h3>
<input id="email" placeholder="Email">
<input id="password" type="password" placeholder="Password">
<button onclick="login()">Login</button>
</div>

<div id="app" style="display:none;">

<!-- DASHBOARD -->
<div class="card">
<h3>Dashboard</h3>
<div id="dash"></div>
</div>

<!-- EQUIPMENT -->
<div class="card">
<h3>Select Equipment</h3>
<select id="equipList" onchange="selectEq(this.value)"></select>
<button onclick="seed()">Load Equipment</button>
</div>

<!-- DETAILS -->
<div class="card">
<h3 id="eqTitle"></h3>

<input id="machineNum" placeholder="Machine Number">
<input id="serialNum" placeholder="Serial Number">

<input id="note" placeholder="Add note">
<input type="date" id="dueDate">

<button onclick="saveAll()">Save Details</button>
</div>

<!-- LOG -->
<div class="card">
<h3>Log</h3>
<ul id="log"></ul>
</div>

</div>
</div>

<script>
let user="";
let data={};
let current="";

// LOGIN
function login(){
let email = document.getElementById("email").value;
let pass = document.getElementById("password").value;

if(users[email] && users[email] === pass){

user = email;

document.getElementById("loginBox").style.display="none";
document.getElementById("app").style.display="block";

load();

}else{
alert("Invalid login");
}
}

// LOAD
function load(){
db.collection("machines").get().then(snap=>{
data={};
snap.forEach(d=>data[d.id]=d.data());

populate();

let first = Object.keys(data)[0];
if(first) selectEq(first);

dashboard();
});
}

// DROPDOWN
function populate(){
let list = document.getElementById("equipList");
list.innerHTML="";

Object.keys(data).forEach(id=>{
list.innerHTML += `<option value="${id}">${id} - ${data[id].name||""}</option>`;
});
}

// SELECT
function selectEq(id){
current = id;

let e = data[id];

document.getElementById("eqTitle").innerText = e.name;

document.getElementById("machineNum").value = e.machine || "";
document.getElementById("serialNum").value = e.serial || "";

let logBox = document.getElementById("log");
logBox.innerHTML="";

(e.log||[]).forEach(x=>{
logBox.innerHTML += `<li>${x}</li>`;
});
}

// SAVE ALL
function saveAll(){

let note = document.getElementById("note").value;
let due = document.getElementById("dueDate").value;
let machine = document.getElementById("machineNum").value;
let serial = document.getElementById("serialNum").value;

let e = data[current];

e.machine = machine;
e.serial = serial;

e.log = e.log || [];

if(note){
e.log.push(note + " - " + user);
}

if(due){
e.nextServiceDue = new Date(due).toISOString();
}

db.collection("machines").doc(current).set(e).then(()=>{
document.getElementById("note").value="";
load();
});
}

// DASHBOARD (COLOR)
function dashboard(){

let overdue=0, soon=0, ok=0;

Object.values(data).forEach(e=>{

if(!e.nextServiceDue){ ok++; return; }

let d=(new Date(e.nextServiceDue)-new Date())/(1000*60*60*24);

if(d<0) overdue++;
else if(d<5) soon++;
else ok++;

});

document.getElementById("dash").innerHTML = `
<div class="box red">Overdue: ${overdue}</div>
<div class="box yellow">Due Soon: ${soon}</div>
<div class="box green">OK: ${ok}</div>
`;

}

// SEED
function seed(){
let machines = {
"EQ-001":{name:"Machine A"},
"EQ-002":{name:"Machine B"},
"EQ-003":{name:"Machine C"}
};

Object.keys(machines).forEach(id=>{
db.collection("machines").doc(id).set(machines[id]);
});

alert("Equipment Loaded");
load();
}
</script>

</body>
</html>
