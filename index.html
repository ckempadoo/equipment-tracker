<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>DMD Equipment Tracker</title>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY"); // replace later
})();
</script>

<style>
body { font-family: Arial; margin:0; background:#f4f6f8; }

.header {
  display:flex; align-items:center; gap:15px;
  background:#1f2937; color:white; padding:15px;
}

.header img { height:50px; }

.container { padding:20px; }

.card {
  background:white; padding:15px; margin-bottom:15px;
  border-radius:10px; box-shadow:0 2px 6px rgba(0,0,0,0.1);
}

button {
  padding:8px 12px; border:none; border-radius:6px;
  background:#2563eb; color:white; cursor:pointer;
}

input, select {
  padding:8px; margin:5px;
  border-radius:6px; border:1px solid #ccc;
}

.dash-box {
  flex:1; min-width:120px;
  padding:15px; border-radius:10px;
  color:white; font-weight:bold; text-align:center;
}

.overdue { background:#dc2626; }
.soon { background:#f59e0b; }
.ok { background:#16a34a; }

.status-ok { color:green; font-weight:bold; }
.status-soon { color:orange; font-weight:bold; }
.status-overdue { color:red; font-weight:bold; }
</style>
</head>

<body>

<div class="header">
  <img src="images/logo.png">
  <h2>DIRECT MAIL DEPOT Equipment Tracker</h2>
</div>

<div class="container">

<!-- LOGIN -->
<div id="login" class="card">
  <h3>Login</h3>
  <input id="username" placeholder="Your Name">
  <input id="pw" type="password" placeholder="Password">
  <button onclick="login()">Login</button>
</div>

<!-- MAIN -->
<div id="main" style="display:none;">

<div class="card">
  <h3>Dashboard</h3>
  <div style="display:flex; gap:10px;">
    <div id="boxOverdue" class="dash-box overdue"></div>
    <div id="boxSoon" class="dash-box soon"></div>
    <div id="boxOk" class="dash-box ok"></div>
  </div>
</div>

<div class="card">
  <h3>⚠️ Alerts</h3>
  <ul id="alertsList"></ul>
</div>

<div class="card">
  <h3>Equipment</h3>
  <select id="equipmentList" onchange="selectEquipment(this.value)"></select>
</div>

<div class="card">
  <h3 id="equipName"></h3>
  <p id="equipInfo"></p>
  <p id="serviceInfo"></p>
</div>

<div class="card">
  <h3>Maintenance</h3>

  <select id="type">
    <option value="Maintenance">Maintenance</option>
    <option value="Repair">Repair</option>
    <option value="PM">PM</option>
  </select>

  <select id="taskDropdown">
    <option value="">Select task</option>
    <option value="Clean Roll">Clean Roll</option>
    <option value="Replace Ink">Replace Ink</option>
  </select>

  <input id="taskInput" placeholder="Or type your task">
  <button onclick="addTask()">Add</button>
</div>

<div class="card">
  <h3>Maintenance Log</h3>
  <ul id="log"></ul>
</div>

<div class="card">
  <h3>Email Alerts</h3>
  <input id="emailTo" placeholder="Enter email(s)">
  <button onclick="sendEmailAlerts()">📧 Send Alerts</button>
</div>

</div>

<p style="text-align:center;">© 2026 Clifford A. Kempadoo - DIRECT MAIL DEPOT</p>

</div>

<script>
const password="DMD2026";
let currentUser="";
let data={
  "EQ-001":{name:"SCREEN Truepress Jet520HD",unit:"1",maintenance:[],serviceIntervalDays:30},
  "EQ-002":{name:"SCREEN Truepress Jet520HD",unit:"2",maintenance:[],serviceIntervalDays:30}
};
let currentID="EQ-001";

function login(){
  const user = document.getElementById("username").value;
  const pass = document.getElementById("pw").value;

  if(!user){
    alert("Enter your name");
    return;
  }

  if(pass === password){
    currentUser = user;

    document.getElementById("login").style.display = "none";
    document.getElementById("main").style.display = "block";

    loadMachines();
  } else {
    alert("Wrong password");
  }
}

function loadMachines(){
  populateDropdown();
  buildDashboard();
  buildAlerts();
  selectEquipment(currentID);
}

function populateDropdown(){
  equipmentList.innerHTML="";
  Object.keys(data).forEach(id=>{
    equipmentList.innerHTML+=`<option value="${id}">${data[id].name} ${data[id].unit}</option>`;
  });
}

function selectEquipment(id){
  currentID=id;
  let eq=data[id];

  equipName.innerText=eq.name+" "+eq.unit;
  equipInfo.innerText=id+" | Location: "+(eq.location||"-")+" | Serial: "+(eq.serial||"-");

  let status=getStatus(eq);
  let cls="status-ok";
  if(status==="OVERDUE") cls="status-overdue";
  else if(status==="DUE SOON") cls="status-soon";

  serviceInfo.innerHTML=`Status: <span class="${cls}">${status}</span>`;

  log.innerHTML="";
  eq.maintenance.forEach(x=> log.innerHTML+=`<li>${x}</li>`);
}

function getStatus(eq){
  if(!eq.nextServiceDue) return "OK";
  let diff=(new Date(eq.nextServiceDue)-new Date())/(1000*60*60*24);
  if(diff<0) return "OVERDUE";
  if(diff<5) return "DUE SOON";
  return "OK";
}

function addTask(){
  let task=taskDropdown.value || taskInput.value;
  if(!task) return;

  let type=document.getElementById("type").value;

  data[currentID].maintenance.push(
    `[${type}] ${task} | ${new Date().toLocaleString()} | ${currentUser}`
  );

  let next=new Date();
  next.setDate(next.getDate()+30);
  data[currentID].nextServiceDue=next.toISOString().split("T")[0];

  selectEquipment(currentID);
  buildDashboard();
  buildAlerts();
}

function buildDashboard(){
  let o=0,s=0,k=0;
  Object.values(data).forEach(eq=>{
    let st=getStatus(eq);
    if(st==="OVERDUE") o++;
    else if(st==="DUE SOON") s++;
    else k++;
  });

  boxOverdue.innerText="❌ Overdue\n"+o;
  boxSoon.innerText="⚠️ Soon\n"+s;
  boxOk.innerText="✅ OK\n"+k;
}

function buildAlerts(){
  alertsList.innerHTML="";
  Object.keys(data).forEach(id=>{
    let st=getStatus(data[id]);
    if(st!=="OK"){
      alertsList.innerHTML+=`<li>${id} - ${data[id].name} → ${st}</li>`;
    }
  });
}

// TEST EMAIL BUTTON
function sendEmailAlerts(){
  alert("Email button working ✅");
}
</script>

</body>
</html>
